<VirtualHost *:8080>
ServerAdmin webmaster@localhost
DocumentRoot /var/www/html/public

<Directory /var/www/html/public>
AllowOverride All
Require all granted
Options -Indexes +FollowSymLinks
RewriteEngine On
RewriteCond % {
    REQUEST_FILENAM
}
!-d
RewriteCond % {
    REQUEST_FILENAM
}
!-f
RewriteRule ^ index.php [L]